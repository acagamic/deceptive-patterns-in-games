# Netlify build configuration.
# `npm run build` runs `astro build` then `pagefind --site dist`, so the
# static search index is generated as part of every deploy.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Redirect the previous primary domain to the new one (301). `force = true` is
# required because the site also resolves on the old host, so the path would
# otherwise match and the redirect would be skipped.
[[redirects]]
  from = "https://deceptivepatterns.lennartnacke.com/*"
  to = "https://exploitativepatterns.lennartnacke.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/harms/*"
  to = "/costs/:splat"
  status = 301

[[redirects]]
  from = "/harms"
  to = "/costs"
  status = 301

# Pagefind ships small wasm/json assets; make sure they're served correctly.
[[headers]]
  for = "/pagefind/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
